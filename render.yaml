services:
  - type: web
    name: notafacil-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: DigiAI Finance API
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: APP_ENV
        value: production
      - key: CORS_ORIGINS
        value: "https://digiai-finance-beta.onrender.com,http://127.0.0.1:5000,http://localhost:5000"
      - key: DEBUG_RESET_CODE
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: notafacil-db
          property: connectionString

databases:
  - name: notafacil-db
    plan: free
